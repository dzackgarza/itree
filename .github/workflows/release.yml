name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to release (for example, v0.1.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check out shared CI gate
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: dzackgarza/ai-review-ci
          ref: 97ee58d535571b792205658930407ecac50f9c7d
          path: ai-review-ci
          persist-credentials: false

      - name: Verify and relocate shared CI gate
        env:
          SHARED_QC_PIN: 97ee58d535571b792205658930407ecac50f9c7d
        run: |-
          set -euo pipefail
          source_path="$GITHUB_WORKSPACE/ai-review-ci"
          target_path="$RUNNER_TEMP/ai-review-ci"
          test -d "$source_path"
          test ! -e "$target_path"
          test "$(git -C "$source_path" rev-parse HEAD)" = "$SHARED_QC_PIN"
          mv "$source_path" "$target_path"
          test ! -e "$source_path"
          test -d "$target_path"
          test "$(git -C "$target_path" rev-parse HEAD)" = "$SHARED_QC_PIN"
          test ! -e "$HOME/ai-review-ci"
          ln --symbolic "$target_path" "$HOME/ai-review-ci"
          test "$(readlink --canonicalize "$HOME/ai-review-ci")" = "$target_path"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.14'

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: just
          fallback: none

      - name: Install ripgrep
        # The delegated QC gate discovers files with `rg`, matching its pinned runner contract.
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Verify main and release tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          version="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          expected_tag="v${version}"
          if test "$RELEASE_TAG" != "$expected_tag"; then
            echo "expected release tag: $expected_tag" >&2
            exit 1
          fi

      - name: Verify release does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          set +e
          git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" > /dev/null
          tag_status=$?
          set -e
          case "$tag_status" in
            0)
              echo "tag already exists: $RELEASE_TAG" >&2
              exit 1
              ;;
            2) ;;
            *) exit "$tag_status" ;;
          esac
          existing_release="$(gh api graphql \
            -f query='query($owner: String!, $name: String!, $tag: String!) { repository(owner: $owner, name: $name) { release(tagName: $tag) { id } } }' \
            -F owner="$GITHUB_REPOSITORY_OWNER" \
            -F name="${GITHUB_REPOSITORY#*/}" \
            -F tag="$RELEASE_TAG" \
            --jq '.data.repository.release.id // empty')"
          test -z "$existing_release"

      - name: Run CI gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: just test-ci

      - name: Build distribution
        run: just build

      - name: Verify release artifacts
        run: test -n "$(find dist -maxdepth 1 -type f -print -quit)"

      - name: Create annotated tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "$RELEASE_TAG" --message "Release $RELEASE_TAG"
          gh auth setup-git --hostname github.com
          git push origin "$RELEASE_TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: gh release create "$RELEASE_TAG" dist/* --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes
